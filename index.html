<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cat stopwatch</title>
<style>
  :root {
    --bg: #FAF7F1;
    --card: #FFFFFF;
    --text: #26211A;
    --muted: #6E6759;
    --faint: #9A937F;
    --border: #E5E0D3;
    --accent: #C26A1E;
    --good: #3F7A3A;
    --bad: #A32D2D;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1E1C18;
      --card: #28251F;
      --text: #F2EEE4;
      --muted: #A89F8C;
      --faint: #7C755F;
      --border: #3C382E;
      --accent: #E8923A;
      --good: #7FBF6A;
      --bad: #E06A6A;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px 28px;
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  #display {
    margin-top: 12px;
    font-family: "SF Mono", "Cascadia Mono", Consolas, monospace;
    font-size: 48px;
    font-weight: 500;
    letter-spacing: 1px;
    font-variant-numeric: tabular-nums;
  }
  #mood { font-size: 13px; color: var(--muted); margin-top: 4px; text-align: center; }
  .buttons { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; justify-content: center; }
  button {
    font: inherit;
    font-size: 14px;
    color: var(--text);
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 9px 18px;
    min-width: 96px;
    cursor: pointer;
  }
  button:hover:not(:disabled) { border-color: var(--accent); }
  button:active:not(:disabled) { transform: scale(0.98); }
  button:disabled { opacity: 0.4; cursor: default; }
  #laps { width: 100%; margin-top: 24px; }
  .lap-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 4px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .lap-row:first-child { border-top: 1px solid var(--border); }
  .lap-name { color: var(--muted); display: flex; align-items: center; gap: 7px; }
  .lap-time, .lap-total {
    font-family: "SF Mono", "Cascadia Mono", Consolas, monospace;
    font-variant-numeric: tabular-nums;
  }
  .lap-total { color: var(--faint); }
  .note { font-size: 11px; font-family: inherit; margin-left: 5px; }
  #tail { transform-origin: 156px 172px; }
  .running #tail { animation: wag .7s ease-in-out infinite; }
  @keyframes wag { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(18deg); } }
  #earL, #earR { transform-box: fill-box; transform-origin: center bottom; }
  .twitch #earL { animation: tw .35s ease-in-out; }
  .twitch #earR { animation: tw .35s ease-in-out .08s; }
  @keyframes tw { 0%,100% { transform: rotate(0); } 50% { transform: rotate(-9deg); } }
  #zzz { opacity: 0; transition: opacity .4s; }
  .dozing #zzz { opacity: 1; }
  .dozing #zzz text { animation: fl 2.2s ease-in-out infinite; }
  @keyframes fl { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
  @media (prefers-reduced-motion: reduce) {
    .running #tail, .dozing #zzz text, .twitch #earL, .twitch #earR { animation: none; }
  }
</style>
</head>
<body>
<main class="card">
  <svg id="catSvg" width="210" viewBox="0 0 220 212" role="img" aria-label="Cat stopwatch mascot">
    <g id="tail">
      <path d="M156 172 C 198 168, 210 124, 190 100" stroke="#E8923A" stroke-width="13" fill="none" stroke-linecap="round"/>
      <circle cx="190" cy="100" r="7.5" fill="#C26A1E"/>
    </g>
    <ellipse cx="106" cy="156" rx="56" ry="44" fill="#E8923A"/>
    <path d="M62 138 Q70 146 64 156" stroke="#C26A1E" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M150 138 Q142 146 148 156" stroke="#C26A1E" stroke-width="3" fill="none" stroke-linecap="round"/>
    <ellipse cx="106" cy="168" rx="27" ry="25" fill="#F7E3C3"/>
    <ellipse cx="86" cy="194" rx="15" ry="8" fill="#E8923A"/>
    <ellipse cx="126" cy="194" rx="15" ry="8" fill="#E8923A"/>
    <path d="M82 190 V197 M90 190 V197 M122 190 V197 M130 190 V197" stroke="#C26A1E" stroke-width="1.5" stroke-linecap="round"/>
    <g id="earL"><polygon points="70,54 58,14 98,38" fill="#E8923A"/><polygon points="72,48 64,22 90,38" fill="#E89AAD"/></g>
    <g id="earR"><polygon points="142,54 154,14 114,38" fill="#E8923A"/><polygon points="140,48 148,22 122,38" fill="#E89AAD"/></g>
    <circle cx="106" cy="80" r="44" fill="#E8923A"/>
    <path d="M98 40 V52 M106 38 V52 M114 40 V52" stroke="#C26A1E" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="106" cy="98" rx="20" ry="13" fill="#F7E3C3"/>
    <polygon points="106,94 101,88 111,88" fill="#D9748C"/>
    <path d="M106 94 C106 100 101 102 96 100 M106 94 C106 100 111 102 116 100" stroke="#C26A1E" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <path d="M86 94 L56 90 M87 99 L57 102 M126 94 L156 90 M125 99 L155 102" stroke="#B98C5A" stroke-width="1.5" stroke-linecap="round"/>
    <g id="eyesClosed"><path d="M80 74 Q87 81 94 74" stroke="#5A3A1E" stroke-width="2.6" fill="none" stroke-linecap="round"/><path d="M118 74 Q125 81 132 74" stroke="#5A3A1E" stroke-width="2.6" fill="none" stroke-linecap="round"/></g>
    <g id="eyesOpen" style="opacity:0;"><ellipse cx="87" cy="73" rx="7.5" ry="9" fill="#FFFDF5"/><ellipse cx="125" cy="73" rx="7.5" ry="9" fill="#FFFDF5"/><circle cx="87" cy="74" r="5" fill="#3F7A3A"/><circle cx="125" cy="74" r="5" fill="#3F7A3A"/><circle cx="87" cy="74" r="2.2" fill="#26211A"/><circle cx="125" cy="74" r="2.2" fill="#26211A"/><circle cx="89" cy="71.5" r="1.2" fill="#FFFDF5"/><circle cx="127" cy="71.5" r="1.2" fill="#FFFDF5"/></g>
    <g id="zzz"><text x="162" y="44" font-size="16" font-weight="500" fill="#8A8578">z</text><text x="174" y="30" font-size="13" fill="#8A8578">z</text><text x="184" y="18" font-size="11" fill="#8A8578">z</text></g>
  </svg>
  <div id="display">00:00.00</div>
  <div id="mood">Cat is napping. Press start to wake it up.</div>
  <div class="buttons">
    <button id="startBtn"><span id="startLabel">Start</span></button>
    <button id="lapBtn" disabled>Lap</button>
    <button id="resetBtn" disabled>Reset</button>
  </div>
  <div id="laps"></div>
</main>
<script>
let running = false, startTime = 0, elapsed = 0, rafId = null, laps = [], lastLapTotal = 0;
const cat = document.getElementById('catSvg');
const eyesOpen = document.getElementById('eyesOpen');
const eyesClosed = document.getElementById('eyesClosed');
const display = document.getElementById('display');
const mood = document.getElementById('mood');
const startBtn = document.getElementById('startBtn');
const startLabel = document.getElementById('startLabel');
const lapBtn = document.getElementById('lapBtn');
const resetBtn = document.getElementById('resetBtn');
const lapsEl = document.getElementById('laps');
cat.classList.add('dozing');

const pawSvg = '<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><ellipse cx="12" cy="16" rx="5" ry="4.2"/><circle cx="5.5" cy="11" r="2.1"/><circle cx="9.5" cy="7.5" r="2.1"/><circle cx="14.5" cy="7.5" r="2.1"/><circle cx="18.5" cy="11" r="2.1"/></svg>';

function fmt(ms) {
  const totalCs = Math.floor(ms / 10);
  const cs = totalCs % 100;
  const totalSec = Math.floor(totalCs / 100);
  const s = totalSec % 60;
  const m = Math.floor(totalSec / 60);
  return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0') + '.' + String(cs).padStart(2, '0');
}
function tick() {
  elapsed = Date.now() - startTime;
  display.textContent = fmt(elapsed);
  rafId = requestAnimationFrame(tick);
}
function wake(awake) {
  eyesOpen.style.opacity = awake ? '1' : '0';
  eyesClosed.style.opacity = awake ? '0' : '1';
  cat.classList.toggle('running', awake);
  cat.classList.toggle('dozing', !awake);
}
startBtn.addEventListener('click', () => {
  if (!running) {
    running = true;
    startTime = Date.now() - elapsed;
    rafId = requestAnimationFrame(tick);
    startLabel.textContent = 'Pause';
    lapBtn.disabled = false;
    resetBtn.disabled = false;
    wake(true);
    mood.textContent = 'Cat is on the clock. Tail at full wag.';
  } else {
    running = false;
    cancelAnimationFrame(rafId);
    elapsed = Date.now() - startTime;
    display.textContent = fmt(elapsed);
    startLabel.textContent = 'Resume';
    lapBtn.disabled = true;
    wake(false);
    mood.textContent = 'Paused. Cat took the opportunity to nap.';
  }
});
lapBtn.addEventListener('click', () => {
  if (!running) return;
  const total = Date.now() - startTime;
  const lapTime = total - lastLapTotal;
  lastLapTotal = total;
  laps.unshift({ n: laps.length + 1, lap: lapTime, total: total });
  cat.classList.remove('twitch');
  void cat.getBoundingClientRect();
  cat.classList.add('twitch');
  renderLaps();
});
resetBtn.addEventListener('click', () => {
  running = false;
  cancelAnimationFrame(rafId);
  elapsed = 0; lastLapTotal = 0; laps = [];
  display.textContent = '00:00.00';
  startLabel.textContent = 'Start';
  lapBtn.disabled = true;
  resetBtn.disabled = true;
  lapsEl.innerHTML = '';
  wake(false);
  mood.textContent = 'Cat is napping. Press start to wake it up.';
});
function renderLaps() {
  if (!laps.length) { lapsEl.innerHTML = ''; return; }
  let best = null, worst = null;
  if (laps.length > 1) {
    best = Math.min(...laps.map(l => l.lap));
    worst = Math.max(...laps.map(l => l.lap));
  }
  let html = '';
  for (const l of laps) {
    let color = 'var(--text)', note = '';
    if (best !== null && l.lap === best) { color = 'var(--good)'; note = '<span class="note">fastest pounce</span>'; }
    else if (worst !== null && l.lap === worst) { color = 'var(--bad)'; note = '<span class="note">slowest stretch</span>'; }
    html += '<div class="lap-row">'
      + '<span class="lap-name">' + pawSvg + 'Lap ' + l.n + '</span>'
      + '<span class="lap-time" style="color:' + color + ';">' + fmt(l.lap) + note + '</span>'
      + '<span class="lap-total">' + fmt(l.total) + '</span>'
      + '</div>';
  }
  lapsEl.innerHTML = html;
}
</script>
</body>
</html>
